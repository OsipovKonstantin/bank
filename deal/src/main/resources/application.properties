server.port=8082
calculator.url=http://localhost:8081/calculator

springdoc.swagger-ui.default-models-expand-depth=4
springdoc.swagger-ui.default-model-expand-depth=4

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.enabled=true
spring.liquibase.clear-checksums=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/creditbank
spring.datasource.username=postgres
spring.datasource.password=root